<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Form</title>
</head>
<body>
    
    <form>
        <fieldset>
            <legend>User personal information</legend>

            <label for="fullName">Enter your full name</label>
            <br/>
            <input type="text" id="fullName" name="fullName">

            <br/>
            <br/>

            <label for="emailID">Enter your email</label>
            <br/>
            <input type="email" id="emailID" name="emailID">

            <br/>
            <br/>

            <label for="passwordField">Enter your password</label>
            <br/>
            <input type="password" id="passwordField" name="passwordField">

            <br/>
            <br/>

            <label for="confirmPasswordField">Confirm your password</label>
            <br/>
            <input type="password" id="confirmPasswordField" name="confirmPasswordField">

            <p>Enter your gender</p>

            <label for="maleRadioButton">Male</label>
            <input type="radio" name="genderRadioButton" id="maleRadioButton">

            <label for="femaleRadioButton">Female</label>
            <input type="radio" name="genderRadioButton" id="femaleRadioButton">

            <label for="othersRadioButton">Others</label>
            <input type="radio" name="genderRadioButton" id="othersRadioButton">

            <br/>
            <br/>

            <label for="dobField">Enter your Date of Birth</label>
            <br/>
            <input type="date" id="dobField" name="dobField">

            <br/>
            <br/>

            <label for="addressTextArea">Enter your Address</label>
            <br/>
            <textarea name="addressTextArea" id="addressTextArea"></textarea>

            <br/>

            <input type="submit" name="submitButton" id="submitButton" value="Submit">
        </fieldset>
    </form>
</body>
</html>
